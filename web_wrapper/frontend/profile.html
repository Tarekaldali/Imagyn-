<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الملف الشخصي - منصة AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            direction: rtl;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        .nav-icons {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .icon-btn {
            background: none;
            border: none;
            font-size: 1.3rem;
            color: #667eea;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .icon-btn:hover {
            transform: scale(1.1);
            color: #764ba2;
        }

        .credits-display {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 25px;
            font-weight: bold;
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .profile-card {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 2rem;
            padding-bottom: 2rem;
            border-bottom: 2px solid #f0f0f0;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3rem;
            font-weight: bold;
        }

        .profile-info {
            flex: 1;
        }

        .profile-name {
            font-size: 2rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 0.5rem;
        }

        .profile-email {
            color: #666;
            font-size: 1.1rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 1.5rem;
            border-radius: 15px;
            color: white;
            text-align: center;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .stat-label {
            font-size: 1rem;
            opacity: 0.9;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #333;
            margin: 2rem 0 1rem 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .info-item {
            background: #f8f9fa;
            padding: 1.5rem;
            border-radius: 10px;
            border-right: 4px solid #667eea;
        }

        .info-label {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 0.5rem;
        }

        .info-value {
            font-size: 1.2rem;
            font-weight: 600;
            color: #333;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        @media (max-width: 768px) {
            .profile-header {
                flex-direction: column;
                text-align: center;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="logo" onclick="window.location.href='index.html'">
            <i class="fas fa-brain"></i> AI Platform
        </div>
        <div class="nav-icons">
            <div class="credits-display" onclick="window.location.href='buy-credits.html'">
                <i class="fas fa-bolt"></i>
                <span id="credits-count">--</span>
            </div>
            <button class="icon-btn" onclick="window.location.href='history.html'" title="السجل">
                <i class="fas fa-history"></i>
            </button>
            <button class="icon-btn" onclick="window.location.href='settings.html'" title="الإعدادات">
                <i class="fas fa-cog"></i>
            </button>
            <button class="icon-btn" onclick="window.location.href='profile.html'" title="الملف الشخصي">
                <i class="fas fa-user"></i>
            </button>
        </div>
    </nav>

    <!-- Profile Content -->
    <div class="container">
        <div class="profile-card">
            <div class="profile-header">
                <div class="avatar" id="avatar">
                    <i class="fas fa-user"></i>
                </div>
                <div class="profile-info">
                    <div class="profile-name" id="profile-name">جاري التحميل...</div>
                    <div class="profile-email" id="profile-email">---</div>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="total-images">0</div>
                    <div class="stat-label">إجمالي الصور</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="credits-stat">0</div>
                    <div class="stat-label">الرصيد المتبقي</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="member-since">---</div>
                    <div class="stat-label">عضو منذ</div>
                </div>
            </div>
        </div>

        <div class="profile-card">
            <h2 class="section-title">
                <i class="fas fa-info-circle"></i>
                معلومات الحساب
            </h2>
            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label">البريد الإلكتروني</div>
                    <div class="info-value" id="email-info">---</div>
                </div>
                <div class="info-item">
                    <div class="info-label">معرف المستخدم</div>
                    <div class="info-value" id="user-id">---</div>
                </div>
                <div class="info-item">
                    <div class="info-label">تاريخ الانضمام</div>
                    <div class="info-value" id="join-date">---</div>
                </div>
                <div class="info-item">
                    <div class="info-label">آخر نشاط</div>
                    <div class="info-value" id="last-activity">---</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';
        let token = localStorage.getItem('token');

        // Check authentication
        if (!token) {
            window.location.href = 'login.html';
        }

        // Load profile data
        async function loadProfile() {
            try {
                // Fetch user data
                const response = await fetch(`${API_URL}/api/auth/me`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    if (response.status === 401) {
                        localStorage.removeItem('token');
                        window.location.href = 'login.html';
                        return;
                    }
                    throw new Error('فشل تحميل البيانات');
                }

                const userData = await response.json();
                
                // Update profile info
                document.getElementById('profile-name').textContent = userData.email.split('@')[0];
                document.getElementById('profile-email').textContent = userData.email;
                document.getElementById('email-info').textContent = userData.email;
                document.getElementById('user-id').textContent = userData.id;
                document.getElementById('credits-count').textContent = userData.credits || 0;
                document.getElementById('credits-stat').textContent = userData.credits || 0;

                // Set avatar initial
                const initial = userData.email.charAt(0).toUpperCase();
                document.getElementById('avatar').textContent = initial;

                // Format dates
                if (userData.created_at) {
                    const createdDate = new Date(userData.created_at);
                    document.getElementById('join-date').textContent = createdDate.toLocaleDateString('ar-EG');
                    document.getElementById('member-since').textContent = createdDate.toLocaleDateString('ar-EG', { year: 'numeric', month: 'short' });
                }

                // Set last activity (now)
                document.getElementById('last-activity').textContent = new Date().toLocaleDateString('ar-EG') + ' ' + new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });

                // Fetch image count
                const imagesResponse = await fetch(`${API_URL}/api/user_images/count`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (imagesResponse.ok) {
                    const imagesData = await imagesResponse.json();
                    document.getElementById('total-images').textContent = imagesData.total || 0;
                }

            } catch (error) {
                console.error('Error loading profile:', error);
                alert('حدث خطأ أثناء تحميل البيانات');
            }
        }

        // Load profile on page load
        loadProfile();
    </script>
</body>
</html>
