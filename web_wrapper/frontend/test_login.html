<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Test - Debug</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .test-section {
            background: #f5f5f5;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
        }
        .success { color: green; }
        .error { color: red; }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        pre {
            background: #333;
            color: #0f0;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>🔍 Login/Register Debug Tool</h1>

    <div class="test-section">
        <h2>1. Test Backend Connection</h2>
        <button onclick="testBackend()">Test Backend</button>
        <div id="backend-result"></div>
    </div>

    <div class="test-section">
        <h2>2. Test Registration</h2>
        <input type="text" id="test-name" placeholder="Your Name" value="Test User">
        <input type="email" id="test-email" placeholder="email@test.com" value="test@example.com">
        <input type="password" id="test-password" placeholder="password" value="password123">
        <button onclick="testRegister()">Test Register</button>
        <div id="register-result"></div>
    </div>

    <div class="test-section">
        <h2>3. Test Login</h2>
        <input type="email" id="login-email" placeholder="email@test.com" value="test@example.com">
        <input type="password" id="login-password" placeholder="password" value="password123">
        <button onclick="testLogin()">Test Login</button>
        <div id="login-result"></div>
    </div>

    <div class="test-section">
        <h2>Console Logs</h2>
        <pre id="console-logs"></pre>
    </div>

    <script>
        const BACKEND_API_URL = 'http://localhost:8000';
        let logs = [];

        function log(message, type = 'info') {
            const timestamp = new Date().toISOString().split('T')[1].split('.')[0];
            const logMessage = `[${timestamp}] ${message}`;
            logs.push(logMessage);
            document.getElementById('console-logs').textContent = logs.join('\n');
            console.log(logMessage);
        }

        async function testBackend() {
            const resultDiv = document.getElementById('backend-result');
            resultDiv.innerHTML = '<p>Testing backend connection...</p>';
            log('Testing backend connection to ' + BACKEND_API_URL);
            
            try {
                const response = await fetch(`${BACKEND_API_URL}/docs`);
                log(`Backend response status: ${response.status}`);
                
                if (response.ok) {
                    resultDiv.innerHTML = '<p class="success">✅ Backend is running!</p>';
                    log('✅ Backend is accessible');
                } else {
                    resultDiv.innerHTML = `<p class="error">❌ Backend returned status: ${response.status}</p>`;
                    log(`❌ Backend error: ${response.status}`);
                }
            } catch (error) {
                resultDiv.innerHTML = `<p class="error">❌ Cannot connect to backend: ${error.message}</p>`;
                log(`❌ Connection error: ${error.message}`);
            }
        }

        async function testRegister() {
            const resultDiv = document.getElementById('register-result');
            resultDiv.innerHTML = '<p>Testing registration...</p>';
            
            const name = document.getElementById('test-name').value;
            const email = document.getElementById('test-email').value;
            const password = document.getElementById('test-password').value;
            
            log(`Attempting registration: ${email}`);
            
            try {
                const response = await fetch(`${BACKEND_API_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name, email, password })
                });
                
                log(`Register response status: ${response.status}`);
                
                const data = await response.json();
                log(`Register response data: ${JSON.stringify(data, null, 2)}`);
                
                if (response.ok && data.success) {
                    resultDiv.innerHTML = `<p class="success">✅ Registration successful!</p><pre>${JSON.stringify(data, null, 2)}</pre>`;
                    log('✅ Registration successful');
                } else {
                    resultDiv.innerHTML = `<p class="error">❌ Registration failed: ${data.detail || data.message}</p><pre>${JSON.stringify(data, null, 2)}</pre>`;
                    log(`❌ Registration failed: ${data.detail || data.message}`);
                }
            } catch (error) {
                resultDiv.innerHTML = `<p class="error">❌ Registration error: ${error.message}</p>`;
                log(`❌ Registration error: ${error.message}`);
            }
        }

        async function testLogin() {
            const resultDiv = document.getElementById('login-result');
            resultDiv.innerHTML = '<p>Testing login...</p>';
            
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            
            log(`Attempting login: ${email}`);
            
            try {
                const response = await fetch(`${BACKEND_API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });
                
                log(`Login response status: ${response.status}`);
                
                const data = await response.json();
                log(`Login response data: ${JSON.stringify(data, null, 2)}`);
                
                if (response.ok && data.success) {
                    resultDiv.innerHTML = `<p class="success">✅ Login successful!</p><pre>${JSON.stringify(data, null, 2)}</pre>`;
                    log('✅ Login successful');
                } else {
                    resultDiv.innerHTML = `<p class="error">❌ Login failed: ${data.detail || data.message}</p><pre>${JSON.stringify(data, null, 2)}</pre>`;
                    log(`❌ Login failed: ${data.detail || data.message}`);
                }
            } catch (error) {
                resultDiv.innerHTML = `<p class="error">❌ Login error: ${error.message}</p>`;
                log(`❌ Login error: ${error.message}`);
            }
        }

        // Auto-test backend on load
        window.addEventListener('load', () => {
            log('Page loaded, testing backend...');
            testBackend();
        });
    </script>
</body>
</html>
