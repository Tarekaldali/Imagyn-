<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل الصور - منصة AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            direction: rtl;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        .nav-icons {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .icon-btn {
            background: none;
            border: none;
            font-size: 1.3rem;
            color: #667eea;
            cursor: pointer;
            transition: all 0.3s;
        }

        .icon-btn:hover {
            transform: scale(1.1);
            color: #764ba2;
        }

        .credits-display {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 25px;
            font-weight: bold;
        }

        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .header {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title {
            font-size: 2rem;
            font-weight: bold;
            color: #333;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .stats {
            display: flex;
            gap: 2rem;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #666;
        }

        .filters {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.6rem 1.5rem;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .filter-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .image-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
            cursor: pointer;
        }

        .image-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.2);
        }

        .image-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 100%;
            overflow: hidden;
            background: #f0f0f0;
        }

        .image-wrapper img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-info {
            padding: 1.5rem;
        }

        .image-prompt {
            font-size: 0.95rem;
            color: #333;
            margin-bottom: 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.5;
        }

        .image-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: #666;
        }

        .image-date {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .image-model {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: white;
            font-size: 1.2rem;
        }

        .empty-state {
            background: white;
            border-radius: 20px;
            padding: 4rem 2rem;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .empty-icon {
            font-size: 5rem;
            color: #e0e0e0;
            margin-bottom: 1rem;
        }

        .empty-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 0.5rem;
        }

        .empty-desc {
            color: #666;
            margin-bottom: 2rem;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            max-width: 900px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            left: 1rem;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            z-index: 10;
        }

        .modal-image {
            width: 100%;
            border-radius: 20px 20px 0 0;
        }

        .modal-details {
            padding: 2rem;
        }

        .modal-prompt {
            font-size: 1.1rem;
            color: #333;
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .modal-meta {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            padding: 1rem;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .meta-item {
            display: flex;
            flex-direction: column;
        }

        .meta-label {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 0.3rem;
        }

        .meta-value {
            font-weight: 600;
            color: #333;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 1rem;
            }

            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 1rem;
            }

            .modal-meta {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="logo" onclick="window.location.href='index.html'">
            <i class="fas fa-brain"></i> AI Platform
        </div>
        <div class="nav-icons">
            <div class="credits-display" onclick="window.location.href='buy-credits.html'">
                <i class="fas fa-bolt"></i>
                <span id="credits-count">--</span>
            </div>
            <button class="icon-btn" onclick="window.location.href='history.html'" title="السجل">
                <i class="fas fa-history"></i>
            </button>
            <button class="icon-btn" onclick="window.location.href='settings.html'" title="الإعدادات">
                <i class="fas fa-cog"></i>
            </button>
            <button class="icon-btn" onclick="window.location.href='profile.html'" title="الملف الشخصي">
                <i class="fas fa-user"></i>
            </button>
        </div>
    </nav>

    <!-- History Content -->
    <div class="container">
        <div class="header">
            <div class="header-title">
                <i class="fas fa-history"></i>
                سجل الصور المولدة
            </div>
            <div class="stats">
                <div class="stat">
                    <div class="stat-value" id="total-images">0</div>
                    <div class="stat-label">إجمالي الصور</div>
                </div>
            </div>
        </div>

        <div class="filters">
            <button class="filter-btn active" onclick="filterImages('all')">الكل</button>
            <button class="filter-btn" onclick="filterImages('today')">اليوم</button>
            <button class="filter-btn" onclick="filterImages('week')">هذا الأسبوع</button>
            <button class="filter-btn" onclick="filterImages('month')">هذا الشهر</button>
        </div>

        <div id="loading" class="loading">
            <i class="fas fa-spinner fa-spin"></i> جاري تحميل الصور...
        </div>

        <div id="gallery" class="gallery" style="display: none;"></div>

        <div id="empty-state" class="empty-state" style="display: none;">
            <div class="empty-icon">
                <i class="fas fa-images"></i>
            </div>
            <div class="empty-title">لا توجد صور بعد</div>
            <div class="empty-desc">ابدأ بتوليد صورك الأولى باستخدام الذكاء الاصطناعي</div>
            <button class="btn" onclick="window.location.href='index.html'">
                <i class="fas fa-plus"></i> توليد صورة جديدة
            </button>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal()">
                <i class="fas fa-times"></i>
            </button>
            <img id="modal-image" class="modal-image" src="" alt="صورة">
            <div class="modal-details">
                <div class="modal-prompt" id="modal-prompt"></div>
                <div class="modal-meta" id="modal-meta"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';
        let token = localStorage.getItem('token');
        let allImages = [];
        let currentFilter = 'all';

        // Check authentication
        if (!token) {
            window.location.href = 'login.html';
        }

        // Load images
        async function loadImages() {
            try {
                document.getElementById('loading').style.display = 'block';
                document.getElementById('gallery').style.display = 'none';
                document.getElementById('empty-state').style.display = 'none';

                // Load user credits
                const userResponse = await fetch(`${API_URL}/api/auth/me`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (userResponse.ok) {
                    const userData = await userResponse.json();
                    document.getElementById('credits-count').textContent = userData.credits || 0;
                }

                // Load images
                const response = await fetch(`${API_URL}/api/user_images?limit=100`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    if (response.status === 401) {
                        localStorage.removeItem('token');
                        window.location.href = 'login.html';
                        return;
                    }
                    throw new Error('فشل تحميل الصور');
                }

                allImages = await response.json();
                
                document.getElementById('loading').style.display = 'none';

                if (allImages.length === 0) {
                    document.getElementById('empty-state').style.display = 'block';
                } else {
                    document.getElementById('total-images').textContent = allImages.length;
                    displayImages(allImages);
                }

            } catch (error) {
                console.error('Error loading images:', error);
                document.getElementById('loading').style.display = 'none';
                alert('حدث خطأ أثناء تحميل الصور');
            }
        }

        // Display images
        function displayImages(images) {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';
            gallery.style.display = 'grid';

            images.forEach(image => {
                const card = document.createElement('div');
                card.className = 'image-card';
                card.onclick = () => openModal(image);

                const createdDate = new Date(image.created_at);
                const dateStr = createdDate.toLocaleDateString('ar-EG');

                card.innerHTML = `
                    <div class="image-wrapper">
                        <img src="${image.image_url}" alt="${image.prompt}" loading="lazy">
                    </div>
                    <div class="image-info">
                        <div class="image-prompt">${image.prompt}</div>
                        <div class="image-meta">
                            <div class="image-date">
                                <i class="fas fa-calendar"></i>
                                ${dateStr}
                            </div>
                            <div class="image-model">${image.model_used || 'AI Model'}</div>
                        </div>
                    </div>
                `;

                gallery.appendChild(card);
            });
        }

        // Filter images
        function filterImages(filter) {
            currentFilter = filter;
            
            // Update active button
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            let filtered = allImages;

            if (filter !== 'all') {
                const now = new Date();
                const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                const weekAgo = new Date(today.getTime() - 7 * 24 * 60 * 60 * 1000);
                const monthAgo = new Date(today.getTime() - 30 * 24 * 60 * 60 * 1000);

                filtered = allImages.filter(image => {
                    const imageDate = new Date(image.created_at);
                    
                    if (filter === 'today') {
                        return imageDate >= today;
                    } else if (filter === 'week') {
                        return imageDate >= weekAgo;
                    } else if (filter === 'month') {
                        return imageDate >= monthAgo;
                    }
                    
                    return true;
                });
            }

            if (filtered.length === 0) {
                document.getElementById('gallery').style.display = 'none';
                document.getElementById('empty-state').style.display = 'block';
            } else {
                displayImages(filtered);
            }
        }

        // Open modal
        function openModal(image) {
            const modal = document.getElementById('modal');
            document.getElementById('modal-image').src = image.image_url;
            document.getElementById('modal-prompt').textContent = image.prompt;

            const createdDate = new Date(image.created_at);
            const dateStr = createdDate.toLocaleDateString('ar-EG') + ' ' + createdDate.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });

            document.getElementById('modal-meta').innerHTML = `
                <div class="meta-item">
                    <div class="meta-label">النموذج المستخدم</div>
                    <div class="meta-value">${image.model_used || 'غير محدد'}</div>
                </div>
                <div class="meta-item">
                    <div class="meta-label">تاريخ الإنشاء</div>
                    <div class="meta-value">${dateStr}</div>
                </div>
                <div class="meta-item">
                    <div class="meta-label">وقت التوليد</div>
                    <div class="meta-value">${image.generation_time ? image.generation_time.toFixed(2) + ' ثانية' : 'غير محدد'}</div>
                </div>
                <div class="meta-item">
                    <div class="meta-label">الحالة</div>
                    <div class="meta-value">${image.status === 'completed' ? 'مكتمل' : image.status}</div>
                </div>
            `;

            modal.classList.add('active');
        }

        // Close modal
        function closeModal(event) {
            if (!event || event.target.id === 'modal') {
                document.getElementById('modal').classList.remove('active');
            }
        }

        // Load images on page load
        loadImages();
    </script>
</body>
</html>
